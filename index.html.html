// Tiny session store in memory
let _session = null;
const _listeners = new Set();

function getAuthHeaders(token) {
  return {
    "Content-Type": "application/json",
    "apikey": SUPABASE_ANON,
    "Authorization": `Bearer ${token || SUPABASE_ANON}`,
  };
}

const sbAuth = {
  async signInWithPassword({ email, password }) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`, {
      method: "POST",
      headers: getAuthHeaders(),
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok || data.error || data.error_code) {
      return { error: { message: data.error_description || data.msg || data.message || "Login failed" } };
    }
    // token endpoint returns { access_token, user, ... } flat
    _session = { ...data, user: data.user };
    _listeners.forEach(fn => fn("SIGNED_IN", _session));
    return { data, error: null };
  },
  async signUp({ email, password }) {
    const res = await fetch(`${SUPABASE_URL}/auth/v1/signup`, {
      method: "POST",
      headers: getAuthHeaders(),
      body: JSON.stringify({ email, password }),
    });
    const data = await res.json();
    if (!res.ok || data.error || data.error_code) {
      return { error: { message: data.error_description || data.msg || data.message || "Signup failed" } };
    }
    // data = { user, session } — session is null if email confirmation required
    const session = data.session;
    if (session?.access_token) {
      // Flatten so _session has access_token at top level, user nested
      _session = { ...session, user: data.user };
      _listeners.forEach(fn => fn("SIGNED_IN", _session));
    }
    return { data, error: null };
  },
  async signOut() {
    if (_session?.access_token) {
      await fetch(`${SUPABASE_URL}/auth/v1/logout`, {
        method: "POST",
        headers: getAuthHeaders(_session.access_token),
      }).catch(() => {});
    }
    _session = null;
    _listeners.forEach(fn => fn("SIGNED_OUT", null));
  },
  getSession() {
    // Try to restore from localStorage
    try {
      const saved = localStorage.getItem("sb_session");
      if (saved && !_session) _session = JSON.parse(saved);
    } catch {}
    return _session;
  },
  onAuthStateChange(callback) {
    // Fire immediately with current state
    const saved = sbAuth.getSession();
    setTimeout(() => callback(saved ? "SIGNED_IN" : "SIGNED_OUT", saved), 0);
    _listeners.add(callback);
    return { data: { subscription: { unsubscribe: () => _listeners.delete(callback) } } };
  },
};

async function sbFrom(table, token) {
  const base = `${SUPABASE_URL}/rest/v1/${table}`;
  const headers = getAuthHeaders(token);
  headers["Prefer"] = "return=minimal";
  return {
    async select(cols = "*", params = "") {
      const res = await fetch(`${base}?select=${cols}${params}`, { headers: { ...headers, Prefer: "return=representation" } });
      const data = await res.json();
      if (!res.ok) return { data: null, error: data };
      return { data, error: null };
    },
    async insert(body) {
      const res = await fetch(base, { method: "POST", headers, body: JSON.stringify(body) });
      if (!res.ok) { const e = await res.json(); return { error: e }; }
      return { error: null };
    },
    async update(body, matchCol, matchVal, matchCol2, matchVal2) {
      let url = `${base}?${matchCol}=eq.${matchVal}`;
      if (matchCol2) url += `&${matchCol2}=eq.${matchVal2}`;
      const res = await fetch(url, { method: "PATCH", headers, body: JSON.stringify(body) });
      if (!res.ok) { const e = await res.json(); return { error: e }; }
      return { error: null };
    },
    async delete(matchCol, matchVal, matchCol2, matchVal2) {
      let url = `${base}?${matchCol}=eq.${matchVal}`;
      if (matchCol2) url += `&${matchCol2}=eq.${matchVal2}`;
      const res = await fetch(url, { method: "DELETE", headers });
      if (!res.ok) { const e = await res.json(); return { error: e }; }
      return { error: null };
    },
  };
}

/* ─── DONUT CHART (pure SVG, no Recharts) ──────────────────── */
function DonutChart({ data, centerLabel, centerSub, size = 200 }) {
  const [active, setActive] = useState(null);
  if (!data || data.length === 0) return null;

  const cx = size / 2, cy = size / 2;
  const R = size * 0.46, r = size * 0.32;
  const total = data.reduce((s, d) => s + d.value, 0);

  let angle = -Math.PI / 2;
  const slices = data.map((d, i) => {
    const sweep = (d.value / total) * 2 * Math.PI * 0.97;
    const x1 = cx + R * Math.cos(angle), y1 = cy + R * Math.sin(angle);
    const x2 = cx + R * Math.cos(angle + sweep), y2 = cy + R * Math.sin(angle + sweep);
    const ix1 = cx + r * Math.cos(angle), iy1 = cy + r * Math.sin(angle);
    const ix2 = cx + r * Math.cos(angle + sweep), iy2 = cy + r * Math.sin(angle + sweep);
    const large = sweep > Math.PI ? 1 : 0;
    const path = `M${x1},${y1} A${R},${R},0,${large},1,${x2},${y2} L${ix2},${iy2} A${r},${r},0,${large},0,${ix1},${iy1} Z`;
    angle += sweep + 0.03;
    return { ...d, path, i };
  });

  const displayLabel = active !== null ? data[active]?.name : centerLabel;
  const displaySub   = active !== null
    ? `${data[active]?.value} time${data[active]?.value !== 1 ? "s" : ""}`
    : centerSub;

  return (
    <div style={{ position:"relative", width:size, height:size, margin:"0 auto" }}>
      <svg width={size} height={size}>
        {slices.map(s => (
          <path key={s.i} d={s.path}
            fill={symColor(s.name)}
            opacity={active === null || active === s.i ? 1 : 0.4}
            style={{ cursor:"pointer", transition:"opacity .15s" }}
            onMouseEnter={() => setActive(s.i)}
            onMouseLeave={() => setActive(null)}
          />
        ))}
      </svg>
      <div style={{ position:"absolute", inset:0, display:"flex",
        flexDirection:"column", alignItems:"center", justifyContent:"center",
        pointerEvents:"none" }}>
        <span style={{ fontSize:active !== null ? 11 : 13, fontWeight:600,
          color:C.text, textAlign:"center", maxWidth:size * 0.38,
          lineHeight:1.3, fontFamily:"'DM Sans',sans-serif", transition:"all .15s" }}>
          {displayLabel}
        </span>
        {displaySub && (
          <span style={{ fontSize:11, color:C.muted, textAlign:"center",
            marginTop:2, fontFamily:"'DM Sans',sans-serif" }}>
            {displaySub}
          </span>
        )}
      </div>
    </div>
  );
}

/* ─── SEVERITY RING ────────────────────────────────────────── */
function SeverityRing({ value, max = 5, label, size = 100, color = C.sage }) {
  const pct = value / max;
  const r   = (size / 2) * 0.72;
  const circ = 2 * Math.PI * r;
  const dash = circ * pct;
  const cx = size / 2, cy = size / 2;

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:6 }}>
      <div style={{ position:"relative", width:size, height:size }}>
        <svg width={size} height={size} style={{ transform:"rotate(-90deg)" }}>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={C.border} strokeWidth={size*0.1}/>
          <circle cx={cx} cy={cy} r={r} fill="none" stroke={color} strokeWidth={size*0.1}
            strokeDasharray={`${dash} ${circ}`} strokeLinecap="round"
            style={{ transition:"stroke-dasharray .5s ease" }}/>
        </svg>
        <div style={{ position:"absolute", inset:0, display:"flex",
          flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
          <span style={{ fontSize:size*0.22, fontWeight:600, color:C.text,
            fontFamily:"'DM Sans',sans-serif" }}>
            {value > 0 ? value : "–"}
          </span>
          <span style={{ fontSize:size*0.12, color:C.muted,
            fontFamily:"'DM Sans',sans-serif" }}>/5</span>
        </div>
      </div>
      {label && (
        <span style={{ fontSize:11, color:C.muted, fontWeight:500,
          textAlign:"center", lineHeight:1.3 }}>{label}</span>
      )}
    </div>
  );
}

      const u = session?.user ?? null;
      setUser(u);
      if (!u) {
        setLogs([]);
        setReady(true);
      }
      // Persist to localStorage
      try {
        if (session) localStorage.setItem("sb_session", JSON.stringify(session));
        else localStorage.removeItem("sb_session");
      } catch {}
    });
    return () => listener.subscription.unsubscribe();
  }, []);

  // Load logs whenever user is set
  useEffect(() => {
    if (!user) return;
    loadLogs();
  }, [user]);

  const loadLogs = async () => {
    setReady(false);
    const token = _session?.access_token;
    const db = await sbFrom("symptom_logs", token);
    const { data, error } = await db.select(
      "*",
      `&user_id=eq.${user.id}&order=date.desc`
    );
    if (!error && data) {
      const parsed = data.map(row => ({
        id:       row.id,
        date:     row.date,
        time:     row.time_of_day,
        symptoms: row.symptoms ?? [],
        severity: row.severity,
        mood:     row.mood,
        notes:    row.notes ?? "",
      }));
      setLogs(parsed);
    }
    setReady(true);
  };

  const addLog = async (log) => {
    const token = _session?.access_token;
    const db = await sbFrom("symptom_logs", token);
    const { error } = await db.insert({
      id:          log.id,
      user_id:     user.id,
      date:        log.date,
      time_of_day: log.time,
      symptoms:    log.symptoms ?? [],
      severity:    log.severity,
      mood:        log.mood,
      notes:       log.notes,
    });
    if (!error) setLogs(prev => [...prev, log]);
  };

  const updateLog = async (log) => {
    const token = _session?.access_token;
    const db = await sbFrom("symptom_logs", token);
    const { error } = await db.update(
      { date: log.date, time_of_day: log.time, symptoms: log.symptoms ?? [],
        severity: log.severity, mood: log.mood, notes: log.notes },
      "id", log.id, "user_id", user.id
    );
    if (!error) setLogs(prev => prev.map(l => l.id === log.id ? log : l));
  };

  const deleteLog = async (id) => {
    const token = _session?.access_token;
    const db = await sbFrom("symptom_logs", token);
    const { error } = await db.delete("id", id, "user_id", user.id);
    if (!error) setLogs(prev => prev.filter(l => l.id !== id));
  };

  const signOut = async () => {
    await sbAuth.signOut();
    setUser(null);
    setLogs([]);
    setView("home");
  };

  const goToDate = (date) => { setSelDate(date); setView("date"); };
  const goHome   = () => setView("home");

  if (!ready) return (
    <div style={{ background:C.bg, height:"100vh", display:"flex",
      alignItems:"center", justifyContent:"center",
      fontFamily:"'DM Sans', sans-serif" }}>
      <p style={{ color:C.muted }}>Loading…</p>
    </div>
  );

  if (!user) return <AuthScreen />;

  return (
    <>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display&display=swap');
        *,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
        ::-webkit-scrollbar { width:0; }
        input,textarea { outline:none; border:none; background:transparent; font-family:'DM Sans',sans-serif; }
        button { cursor:pointer; border:none; background:none; font-family:'DM Sans',sans-serif; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(10px);} to{opacity:1;transform:translateY(0);} }
        @keyframes slideIn { from{opacity:0;transform:translateX(16px);} to{opacity:1;transform:translateX(0);} }
        @keyframes fadeIn { from{opacity:0;} to{opacity:1;} }
        @keyframes bounce { 0%,80%,100%{transform:translateY(0);} 40%{transform:translateY(-5px);} }
      `}</style>

      <div style={{ fontFamily:"'DM Sans',sans-serif", background:C.bg, minHeight:"100vh" }}>
        <div style={{ paddingBottom: view==="date" ? 0 : 80 }}>
          {view==="home"     && <HomeScreen     logs={logs} goToDate={goToDate} onSignOut={signOut} userEmail={user.email} />}
          {view==="date"     && <DatePage       logs={logs} date={selDate}
                                  addLog={addLog} updateLog={updateLog} deleteLog={deleteLog}
                                  goBack={goHome} />}
          {view==="insights" && <InsightsScreen logs={logs} />}
          {view==="chat"     && <ChatScreen     logs={logs} />}
        </div>
        {view !== "date" && <BottomNav view={view} setView={setView} goToDate={goToDate} />}
      </div>
    </>
  );
}

/* ─── NAV ──────────────────────────────────────────────────── */

    { id:"home",     label:"Calendar", Icon:CalendarDays },

}

/* ─── HOME ─────────────────────────────────────────────────── */
function HomeScreen({ logs, goToDate, onSignOut, userEmail }) {
  const now = new Date();
  const [mo, setMo] = useState(now.getMonth());
  const [yr, setYr] = useState(now.getFullYear());

  const firstDay = new Date(yr,mo,1).getDay();
  const days      = new Date(yr,mo+1,0).getDate();
  const todayStr  = toDateStr();

  const byDate = {};
  logs.forEach(l => { if (!byDate[l.date]) byDate[l.date]=[]; byDate[l.date].push(l); });

  const recentDates = [...new Set(logs.map(l=>l.date))]
    .sort((a,b)=>b.localeCompare(a)).slice(0,3);

  const prevMo = () => mo===0?(setMo(11),setYr(y=>y-1)):setMo(m=>m-1);
  const nextMo = () => mo===11?(setMo(0),setYr(y=>y+1)):setMo(m=>m+1);

  return (
    <div style={{ padding:"36px 20px 20px", maxWidth:480, margin:"0 auto" }}>
      {/* Header with sign out */}
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:4 }}>
        <p style={{ color:C.muted, fontSize:13 }}>
          {now.toLocaleDateString("en-US",{ weekday:"long", month:"long", day:"numeric" })}
        </p>
        <button onClick={onSignOut}
          style={{ display:"flex", alignItems:"center", gap:5, color:C.muted, fontSize:12,
            padding:"6px 10px", borderRadius:10, background:C.card,
            boxShadow:"0 1px 6px rgba(0,0,0,0.06)" }}>
          <LogOut size={12}/> Sign out
        </button>
      </div>
      <h1 style={{ fontFamily:"'DM Serif Display',serif", fontSize:30,
        color:C.text, fontWeight:400, marginBottom:24 }}>Your Journal</h1>

      <div style={{ background:C.card, borderRadius:20, padding:20,
        boxShadow:"0 2px 18px rgba(0,0,0,0.05)", marginBottom:20 }}>
        <div style={{ display:"flex", justifyContent:"space-between",
          alignItems:"center", marginBottom:16 }}>
          <button onClick={prevMo} style={{ color:C.muted, padding:4, lineHeight:0 }}>
            <ChevronLeft size={18}/>
          </button>
          <span style={{ fontSize:15, fontWeight:600, color:C.text }}>
            {MONTHS[mo]} {yr}
          </span>
          <button onClick={nextMo} style={{ color:C.muted, padding:4, lineHeight:0 }}>
            <ChevronRight size={18}/>
          </button>
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", marginBottom:6 }}>
          {["Su","Mo","Tu","We","Th","Fr","Sa"].map((d,i)=>(
            <div key={i} style={{ textAlign:"center", fontSize:11,
              color:C.muted, padding:"2px 0", fontWeight:500 }}>{d}</div>
          ))}
        </div>

        <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", gap:3 }}>
          {Array.from({length:firstDay}).map((_,i)=><div key={`e${i}`}/>)}
          {Array.from({length:days}).map((_,i)=>{
            const d  = i+1;
            const ds = `${yr}-${String(mo+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
            const cnt = (byDate[ds]||[]).length;
            const isToday = ds===todayStr;
            return (
              <button key={d} onClick={()=>goToDate(ds)}
                style={{ display:"flex", flexDirection:"column", alignItems:"center",
                  padding:"5px 2px", borderRadius:10, transition:"all .15s",
                  background:isToday?C.sageLt:"transparent" }}>
                <span style={{ fontSize:13, fontWeight:isToday?600:400,
                  color:isToday?C.sageDk:C.text }}>{d}</span>
                {cnt>0 ? (
                  <div style={{ marginTop:2, minWidth:cnt>1?16:7, height:7,
                    borderRadius:4, background:C.sage, display:"flex",
                    alignItems:"center", justifyContent:"center" }}>
                    {cnt>1 && <span style={{ fontSize:9, color:"#fff", fontWeight:700 }}>{cnt}</span>}
                  </div>
                ) : <div style={{ height:7, marginTop:2 }}/>}
              </button>
            );
          })}
        </div>
      </div>

      {recentDates.length>0 && (
        <>
          <Lbl>Recent</Lbl>
          <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
            {recentDates.map(date => {
              const dl     = byDate[date]||[];
              const allSym = [...new Set(dl.flatMap(l=>l.symptoms))];
              return (
                <button key={date} onClick={()=>goToDate(date)}
                  style={{ background:C.card, borderRadius:16, padding:"14px 16px",
                    display:"flex", justifyContent:"space-between", alignItems:"center",
                    boxShadow:"0 1px 8px rgba(0,0,0,0.05)", textAlign:"left",
                    transition:"all .15s", width:"100%" }}>
                  <div>
                    <p style={{ fontSize:13, fontWeight:600, color:C.text, marginBottom:3 }}>
                      {fmtShort(date)}
                    </p>
                    <p style={{ fontSize:12, color:C.muted }}>
                      {allSym.slice(0,3).join(", ")}{allSym.length>3?` +${allSym.length-3}`:""}
                    </p>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                    <span style={{ fontSize:11, background:C.sageLt, color:C.sageDk,
                      padding:"3px 10px", borderRadius:20, fontWeight:600 }}>
                      {dl.length} log{dl.length>1?"s":""}
                    </span>
                    <ChevronRight size={14} color={C.muted}/>
                  </div>
                </button>
              );
            })}
          </div>
        </>
      )}

      {logs.length===0 && (
        <div style={{ textAlign:"center", marginTop:40, animation:"fadeUp .4s ease" }}>
          <p style={{ fontSize:44, marginBottom:14 }}>🌿</p>
          <p style={{ fontWeight:600, color:C.text, marginBottom:8, fontSize:15 }}>Start your journal</p>
          <p style={{ fontSize:13, color:C.muted, lineHeight:1.65 }}>
            Tap any date on the calendar, or use <strong>Today</strong> below.
          </p>
        </div>
      )}
    </div>
  );
}

/* ─── DATE PAGE ────────────────────────────────────────────── */
function DatePage({ logs, date, addLog, updateLog, deleteLog, goBack }) {
  const [formOpen, setFormOpen] = useState(false);
  const [editLog,  setEditLog]  = useState(null);

  const dayLogs = logs
    .filter(l=>l.date===date)
    .sort((a,b)=>TIME_ORDER.indexOf(a.time)-TIME_ORDER.indexOf(b.time));

  const isFuture = date > toDateStr();

  const symCounts = {};
  dayLogs.forEach(l=>l.symptoms.forEach(s=>{ symCounts[s]=(symCounts[s]||0)+1; }));
  const donutData = Object.entries(symCounts)
    .sort((a,b)=>b[1]-a[1])
    .map(([name,value])=>({name,value}));

  const avgSev = dayLogs.length
    ? Math.round(dayLogs.reduce((s,l)=>s+l.severity,0)/dayLogs.length * 10)/10
    : 0;

  const openAdd  = () => { setEditLog(null); setFormOpen(true); };
  const openEdit = (l) => { setEditLog(l); setFormOpen(true); };

  const handleSave = async (log) => {
    if (editLog) {
      await updateLog(log);
    } else {
      await addLog(log);
    }
    setFormOpen(false);
  };

  const handleDelete = async (id) => {
    await deleteLog(id);
  };

  return (
    <div style={{ minHeight:"100vh", background:C.bg, animation:"slideIn .22s ease" }}>
      <div style={{ padding:"48px 20px 20px", maxWidth:480, margin:"0 auto" }}>
        <button onClick={goBack}
          style={{ display:"flex", alignItems:"center", gap:6,
            color:C.muted, marginBottom:18, fontSize:13 }}>
          <ArrowLeft size={15}/> Calendar
        </button>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
          <div>
            {date===toDateStr() && (
              <p style={{ fontSize:11, color:C.sage, fontWeight:700,
                letterSpacing:"0.08em", marginBottom:4 }}>TODAY</p>
            )}
            <h1 style={{ fontFamily:"'DM Serif Display',serif", fontSize:26,
              color:C.text, fontWeight:400 }}>{fmtFull(date)}</h1>
          </div>
          <button onClick={openAdd}
            style={{ display:"flex", alignItems:"center", gap:6, background:C.sage,
              color:"#fff", padding:"10px 16px", borderRadius:14, fontSize:13, fontWeight:600,
              boxShadow:"0 4px 14px rgba(168,197,160,0.4)", flexShrink:0 }}>
            <Plus size={14}/> Add
          </button>
        </div>
      </div>

      <div style={{ padding:"0 20px 40px", maxWidth:480, margin:"0 auto" }}>
        {dayLogs.length>0 && (
          <div style={{ display:"grid",
            gridTemplateColumns: dayLogs.length>1 ? "1fr 1fr" : "1fr",
            gap:12, marginBottom:20 }}>
            {donutData.length>0 && (
              <div style={{ background:C.card, borderRadius:20, padding:"20px 16px",
                boxShadow:"0 2px 18px rgba(0,0,0,0.05)" }}>
                <p style={{ fontSize:12, fontWeight:600, color:C.text, marginBottom:12, textAlign:"center" }}>
                  Symptoms
                </p>
                <DonutChart data={donutData} centerLabel={`${donutData.length}`}
                  centerSub={donutData.length===1?"type":"types"} size={130}/>
                <div style={{ marginTop:12, display:"flex", flexDirection:"column", gap:4 }}>
                  {donutData.slice(0,4).map((d,i)=>(
                    <div key={d.name} style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ width:8, height:8, borderRadius:"50%", flexShrink:0,
                        background:symColor(d.name) }}/>
                      <span style={{ fontSize:10.5, color:C.muted, lineHeight:1 }}>{d.name}</span>
                    </div>
                  ))}
                  {donutData.length>4 && (
                    <span style={{ fontSize:10, color:C.muted }}>+{donutData.length-4} more</span>
                  )}
                </div>
              </div>
            )}
            {dayLogs.length>1 ? (
              <div style={{ background:C.card, borderRadius:20, padding:"20px 16px",
                boxShadow:"0 2px 18px rgba(0,0,0,0.05)" }}>
                <p style={{ fontSize:12, fontWeight:600, color:C.text, marginBottom:14, textAlign:"center" }}>
                  Severity
                </p>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                  {dayLogs.map(log=>(
                    <SeverityRing key={log.id} value={log.severity||0}
                      color={symColor(log.symptoms[0])}
                      label={TIME_OPS.find(t=>t.id===log.time)?.emoji+" "+TIME_OPS.find(t=>t.id===log.time)?.label}
                      size={72}/>
                  ))}
                </div>
              </div>
            ) : dayLogs.length===1 && (
              <div style={{ background:C.card, borderRadius:20, padding:"20px 16px",
                boxShadow:"0 2px 18px rgba(0,0,0,0.05)",
                display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
                <p style={{ fontSize:12, fontWeight:600, color:C.text, marginBottom:14 }}>Severity</p>
                <SeverityRing value={dayLogs[0]?.severity||0} color={symColor(dayLogs[0]?.symptoms[0])} size={100}/>
              </div>
            )}
          </div>
        )}

        {dayLogs.length===0 ? (
          <div style={{ textAlign:"center", padding:"48px 0", animation:"fadeUp .3s ease" }}>
            <p style={{ fontSize:36, marginBottom:12 }}>{isFuture?"🔮":"🌿"}</p>
            <p style={{ fontSize:14, fontWeight:600, color:C.text, marginBottom:6 }}>
              {isFuture?"Future date":"Nothing logged yet"}
            </p>
            <p style={{ fontSize:13, color:C.muted, lineHeight:1.65 }}>
              {isFuture?"You can add logs for future dates."
                :"Tap Add to record how you're feeling."}
            </p>
          </div>
        ) : (
          <div style={{ position:"relative", paddingLeft:4 }}>
            <div style={{ position:"absolute", left:22, top:12, bottom:12,
              width:1.5, background:C.border, borderRadius:1 }}/>
            {dayLogs.map((log,i)=>(
              <div key={log.id}
                style={{ display:"flex", gap:14, marginBottom:14,
                  animation:`fadeUp ${0.1+i*0.08}s ease` }}>
                <div style={{ flexShrink:0, width:44, display:"flex",
                  flexDirection:"column", alignItems:"center", gap:4, paddingTop:14 }}>
                  <div style={{ width:10, height:10, borderRadius:"50%",
                    background:C.sage, border:"2.5px solid", borderColor:C.bg, zIndex:1 }}/>
                  <span style={{ fontSize:9.5, color:C.muted, fontWeight:500,
                    textAlign:"center", lineHeight:1.3 }}>
                    {TIME_OPS.find(t=>t.id===log.time)?.emoji}<br/>
                    {TIME_OPS.find(t=>t.id===log.time)?.label}
                  </span>
                </div>
                <div style={{ flex:1, background:C.card, borderRadius:16,
                  padding:16, boxShadow:"0 1px 10px rgba(0,0,0,0.05)" }}>
                  <div style={{ display:"flex", justifyContent:"space-between",
                    alignItems:"flex-start", marginBottom:10 }}>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:5, flex:1 }}>
                      {log.symptoms.length>0
                        ? log.symptoms.map(s=>(
                            <span key={s} style={{ background:C.sageLt, color:C.sageDk,
                              padding:"3px 10px", borderRadius:20, fontSize:11, fontWeight:500 }}>
                              {s}
                            </span>
                          ))
                        : <span style={{ fontSize:12, color:C.muted, fontStyle:"italic" }}>
                            No symptoms tagged
                          </span>
                      }
                    </div>
                    <div style={{ display:"flex", gap:8, marginLeft:10, flexShrink:0 }}>
                      <button onClick={()=>openEdit(log)} style={{ lineHeight:0 }}>
                        <Edit2 size={13} color={C.muted}/>
                      </button>
                      <button onClick={()=>handleDelete(log.id)} style={{ lineHeight:0 }}>
                        <Trash2 size={13} color="#E8A0A0"/>
                      </button>
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:12, alignItems:"center" }}>
                    {log.severity>0 && (
                      <div style={{ display:"flex", gap:3 }}>
                        {[1,2,3,4,5].map(n=>(
                          <div key={n} style={{ width:7, height:7, borderRadius:"50%",
                            background:n<=log.severity?C.sage:C.border }}/>
                        ))}
                        <span style={{ fontSize:11, color:C.muted, marginLeft:4 }}>
                          {["","Mild","Mild","Moderate","Moderate","Severe"][log.severity]}
                        </span>
                      </div>
                    )}
                    {log.mood>0 && (
                      <span style={{ fontSize:16, lineHeight:1 }}>{MOOD_EMOJI[log.mood-1]}</span>
                    )}
                  </div>
                  {log.notes && (
                    <p style={{ fontSize:12, color:C.muted, marginTop:8, lineHeight:1.6 }}>
                      {log.notes}
                    </p>
                  )}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {formOpen && (
        <LogForm date={date} editLog={editLog}
          onClose={()=>setFormOpen(false)} onSave={handleSave}/>
      )}
    </div>
  );
}

/* ─── LOG FORM ─────────────────────────────────────────────── */
function LogForm({ date, editLog, onClose, onSave }) {
  const [time,  setTime]  = useState(editLog?.time     ?? "morning");
  const [syms,  setSyms]  = useState(editLog?.symptoms ?? []);
  const [sev,   setSev]   = useState(editLog?.severity ?? 0);
  const [mood,  setMood]  = useState(editLog?.mood     ?? 0);
  const [notes, setNotes] = useState(editLog?.notes    ?? "");
  const [saving, setSaving] = useState(false);

  const toggle  = s => setSyms(p=>p.includes(s)?p.filter(x=>x!==s):[...p,s]);
  const canSave = syms.length>0 || sev>0;

  const handleSave = async () => {
    if (!canSave) return;
    setSaving(true);
    await onSave({ id:editLog?.id??uid(), date, time, symptoms:syms, severity:sev, mood, notes });
    setSaving(false);
  };

  return (
    <div style={{ position:"fixed", inset:0, background:"rgba(61,61,61,0.45)",
      zIndex:300, display:"flex", flexDirection:"column",
      justifyContent:"flex-end", animation:"fadeIn .2s ease" }}>
      <div onClick={e=>e.stopPropagation()}
        style={{ background:C.bg, borderRadius:"24px 24px 0 0",
          maxHeight:"90vh", overflowY:"auto", padding:"20px 20px 40px",
          maxWidth:480, margin:"0 auto", width:"100%" }}>

        <div style={{ width:36, height:4, background:C.border,
          borderRadius:2, margin:"0 auto 22px" }}/>

        <div style={{ display:"flex", justifyContent:"space-between",
          alignItems:"center", marginBottom:24 }}>
          <div>
            <p style={{ fontSize:11, color:C.muted, fontWeight:600,
              letterSpacing:"0.08em", textTransform:"uppercase" }}>
              {editLog?"Edit Log":"New Log"}
            </p>
            <p style={{ fontSize:15, fontWeight:600, color:C.text }}>{fmtShort(date)}</p>
          </div>
          <button onClick={onClose} style={{ lineHeight:0, color:C.muted }}>
            <X size={20}/>
          </button>
        </div>

        <Lbl>Time of Day</Lbl>
        <div style={{ display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:8, marginBottom:24 }}>
          {TIME_OPS.map(t=>(
            <button key={t.id} onClick={()=>setTime(t.id)}
              style={{ padding:"10px 4px", borderRadius:14, display:"flex",
                flexDirection:"column", alignItems:"center", gap:4, transition:"all .15s",
                background:time===t.id?C.sage:C.card,
                boxShadow:"0 1px 8px rgba(0,0,0,0.06)" }}>
              <span style={{ fontSize:20 }}>{t.emoji}</span>
              <span style={{ fontSize:10, fontWeight:600,
                color:time===t.id?"#fff":C.muted }}>{t.label}</span>
            </button>
          ))}
        </div>

        <Lbl>Symptoms</Lbl>
        <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:24 }}>
          {SYMPTOMS.map(s=>{
            const on = syms.includes(s);
            return (
              <button key={s} onClick={()=>toggle(s)}
                style={{ padding:"7px 14px", borderRadius:20, fontSize:13, fontWeight:500,
                  background:on?C.sage:C.card, color:on?"#fff":C.text,
                  boxShadow:"0 1px 8px rgba(0,0,0,0.06)", transition:"all .15s" }}>
                {s}
              </button>
            );
          })}
        </div>

        <Lbl>Severity</Lbl>
        <div style={{ display:"flex", gap:10, alignItems:"center", marginBottom:24 }}>
          {[1,2,3,4,5].map(n=>(
            <button key={n} onClick={()=>setSev(n===sev?0:n)}
              style={{ width:38, height:38, borderRadius:"50%",
                background:n<=sev?C.sage:C.card, color:n<=sev?"#fff":C.muted,
                fontSize:13, fontWeight:600, boxShadow:"0 1px 8px rgba(0,0,0,0.07)",
                transition:"all .15s" }}>{n}</button>
          ))}
          {sev>0 && <span style={{ fontSize:12, color:C.muted }}>
            {["","Mild","Mild","Moderate","Moderate","Severe"][sev]}
          </span>}
        </div>

        <Lbl>Mood</Lbl>
        <div style={{ display:"flex", gap:14, marginBottom:24, paddingLeft:4 }}>
          {MOOD_EMOJI.map((e,i)=>(
            <button key={i} onClick={()=>setMood(i+1===mood?0:i+1)}
              style={{ fontSize:24, lineHeight:1,
                opacity:mood===0||mood===i+1?1:0.3,
                transform:mood===i+1?"scale(1.3)":"scale(1)",
                transition:"all .18s" }}>{e}</button>
          ))}
        </div>

        <Lbl>Notes</Lbl>
        <div style={{ background:C.card, borderRadius:14, padding:"12px 16px",
          marginBottom:26, boxShadow:"0 1px 8px rgba(0,0,0,0.04)" }}>
          <textarea value={notes} onChange={e=>setNotes(e.target.value)}
            placeholder="What else is going on…" rows={2}
            style={{ width:"100%", resize:"none", fontSize:14, color:C.text, lineHeight:1.6 }}/>
        </div>

        <button onClick={handleSave} disabled={!canSave || saving}
          style={{ width:"100%", padding:16, borderRadius:16,
            background:canSave?C.sage:C.border, color:canSave?"#fff":C.muted,
            fontSize:15, fontWeight:600,
            boxShadow:canSave?"0 4px 18px rgba(168,197,160,0.4)":"none",
            transition:"all .2s", opacity: saving ? 0.7 : 1 }}>
          {saving ? "Saving…" : editLog ? "Update Log" : "Save Log"}
        </button>
      </div>
    </div>
  );
}

/* ─── INSIGHTS ─────────────────────────────────────────────── */
function InsightsScreen({ logs }) {
  const [tab,       setTab]       = useState("today");
  const [aiCards,   setAiCards]   = useState([]);
  const [aiLoading, setAiLoading] = useState(false);

  const today = toDateStr();
  const now   = new Date();

  const todayLogs = logs.filter(l=>l.date===today);
  const weekDates = Array.from({length:7},(_,i)=>{ const d=new Date(); d.setDate(d.getDate()-i); return toDateStr(d); });
  const weekLogs  = logs.filter(l=>weekDates.includes(l.date));
  const weekStart = weekDates[weekDates.length-1];
  const monthPrefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,"0")}`;
  const monthLogs   = logs.filter(l=>l.date.startsWith(monthPrefix));

  const symFreq = (arr) => {
    const c={};
    arr.forEach(l=>l.symptoms.forEach(s=>{ c[s]=(c[s]||0)+1; }));
    return Object.entries(c).sort((a,b)=>b[1]-a[1]).slice(0,7)
      .map(([name,value])=>({name,value}));
  };

  const avgSev = (arr) => arr.length
    ? Math.round(arr.reduce((s,l)=>s+l.severity,0)/arr.length*10)/10
    : 0;

  const sevDist = (arr) => {
    const labels = ["","Mild","","Moderate","","Severe"];
    const c={};
    arr.forEach(l=>{ if(l.severity>0){ const k=labels[l.severity]||`Level ${l.severity}`; c[k]=(c[k]||0)+1; } });
    return Object.entries(c).map(([name,value])=>({name,value}));
  };

  const tabs = {
    today: { label:"Today", logs:todayLogs,
      rangeLabel:new Date().toLocaleDateString("en-US",{month:"long",day:"numeric",year:"numeric"}) },
    week:  { label:"Week",  logs:weekLogs,
      rangeLabel:`${fmtShort(weekStart)} – ${fmtShort(today)}` },
    month: { label:"Month", logs:monthLogs,
      rangeLabel:`${MONTHS[now.getMonth()]} ${now.getFullYear()}` },
  };
  const cur = tabs[tab];

  const donutData = symFreq(cur.logs);
  const sevData   = sevDist(cur.logs);
  const avgSevVal = avgSev(cur.logs);

  const loadAI = async () => {
    if (!logs.length) return;
    setAiLoading(true);
    try {
      const txt = await askClaude(
        `You are a warm wellness companion. Analyze this symptom journal and return exactly 3 insight objects as a raw JSON array.
Each object must have:
  "icon": one of: heart, moon, zap, shield, wind, sparkles
  "title": max 5 words
  "description": 2-3 warm specific helpful sentences. Reference time-of-day patterns if visible.
Return ONLY the raw JSON array. No markdown, no code fences, no preamble.`,
        `Log history: ${JSON.stringify(logs)}`
      );
      const clean  = txt.replace(/```json\n?|```\n?/g,"").trim();
      const parsed = JSON.parse(clean);
      setAiCards(Array.isArray(parsed)?parsed:[]);
    } catch {
      setAiCards([{ icon:"sparkles", title:"Keep logging",
        description:"Your journal is growing. A few more entries will unlock richer, personalized patterns." }]);
    }
    setAiLoading(false);
  };

  useEffect(()=>{ if(logs.length) loadAI(); },[]);

  return (
    <div style={{ padding:"36px 20px 20px", maxWidth:480, margin:"0 auto" }}>
      <p style={{ color:C.muted, fontSize:13, marginBottom:4 }}>Your health story</p>
      <h1 style={{ fontFamily:"'DM Serif Display',serif", fontSize:30,
        color:C.text, fontWeight:400, marginBottom:20 }}>Insights</h1>

      <div style={{ display:"flex", gap:6, marginBottom:6, background:C.card,
        padding:4, borderRadius:14, boxShadow:"0 1px 8px rgba(0,0,0,0.05)" }}>
        {Object.entries(tabs).map(([id,t])=>(
          <button key={id} onClick={()=>setTab(id)}
            style={{ flex:1, padding:"9px 0", borderRadius:10, fontSize:13, fontWeight:600,
              background:tab===id?C.sage:"transparent",
              color:tab===id?"#fff":C.muted, transition:"all .18s" }}>
            {t.label}
          </button>
        ))}
      </div>

      <p style={{ fontSize:12, color:C.muted, marginBottom:20, fontWeight:500, paddingLeft:4 }}>
        📅 {cur.rangeLabel}
      </p>

      {cur.logs.length===0 ? (
        <div style={{ background:C.card, borderRadius:20, padding:"32px 24px",
          textAlign:"center", boxShadow:"0 2px 18px rgba(0,0,0,0.05)", marginBottom:20 }}>
          <p style={{ fontSize:32, marginBottom:10 }}>🌱</p>
          <p style={{ fontSize:14, fontWeight:600, color:C.text, marginBottom:6 }}>
            No data for this period
          </p>
          <p style={{ fontSize:13, color:C.muted }}>
            Start logging to see your {cur.label.toLowerCase()} insights.
          </p>
        </div>
      ) : (
        <>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:14 }}>
            {donutData.length>0 && (
              <div style={{ background:C.card, borderRadius:20, padding:"18px 14px",
                boxShadow:"0 2px 18px rgba(0,0,0,0.05)" }}>
                <p style={{ fontSize:12, fontWeight:600, color:C.text,
                  marginBottom:12, textAlign:"center" }}>Symptoms</p>
                <DonutChart data={donutData} centerLabel={`${donutData.length}`}
                  centerSub={donutData.length===1?"type":"types"} size={130}/>
                <div style={{ marginTop:10, display:"flex", flexDirection:"column", gap:4 }}>
                  {donutData.slice(0,4).map((d,i)=>(
                    <div key={d.name} style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ width:7, height:7, borderRadius:"50%", flexShrink:0,
                        background:symColor(d.name) }}/>
                      <span style={{ fontSize:10, color:C.muted }}>{d.name}</span>
                      <span style={{ fontSize:10, color:C.text, marginLeft:"auto",
                        fontWeight:600 }}>{d.value}×</span>
                    </div>
                  ))}
                  {donutData.length>4 && (
                    <span style={{ fontSize:10, color:C.muted }}>+{donutData.length-4} more</span>
                  )}
                </div>
              </div>
            )}
            <div style={{ background:C.card, borderRadius:20, padding:"18px 14px",
              boxShadow:"0 2px 18px rgba(0,0,0,0.05)",
              display:"flex", flexDirection:"column", alignItems:"center" }}>
              <p style={{ fontSize:12, fontWeight:600, color:C.text,
                marginBottom:12, textAlign:"center" }}>Avg Severity</p>
              <SeverityRing value={avgSevVal} size={120} color={symColor(donutData[0]?.name)}/>
              {sevData.length>0 && (
                <div style={{ marginTop:12, width:"100%", display:"flex",
                  flexDirection:"column", gap:4 }}>
                  {sevData.map((d,i)=>(
                    <div key={d.name} style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ width:7, height:7, borderRadius:"50%", flexShrink:0,
                        background:symColor(donutData[i]?.name) }}/>
                      <span style={{ fontSize:10, color:C.muted }}>{d.name}</span>
                      <span style={{ fontSize:10, color:C.text, marginLeft:"auto",
                        fontWeight:600 }}>{d.value}×</span>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {(() => {
            const timeCount={};
            cur.logs.forEach(l=>{ if(l.time){ timeCount[l.time]=(timeCount[l.time]||0)+1; } });
            const timeData = TIME_ORDER.filter(t=>timeCount[t])
              .map(t=>({ name:TIME_OPS.find(x=>x.id===t)?.emoji+" "+TIME_OPS.find(x=>x.id===t)?.label, value:timeCount[t] }));
            if(timeData.length<2) return null;
            return (
              <div style={{ background:C.card, borderRadius:20, padding:"18px 20px",
                boxShadow:"0 2px 18px rgba(0,0,0,0.05)", marginBottom:14 }}>
                <p style={{ fontSize:12, fontWeight:600, color:C.text, marginBottom:16 }}>
                  When symptoms occur
                </p>
                <div style={{ display:"flex", alignItems:"center", gap:16 }}>
                  <DonutChart data={timeData} centerLabel="Time" centerSub="of day" size={140}/>
                  <div style={{ flex:1, display:"flex", flexDirection:"column", gap:8 }}>
                    {timeData.map((d,i)=>(
                      <div key={d.name} style={{ display:"flex", alignItems:"center", gap:8 }}>
                        <div style={{ width:9, height:9, borderRadius:"50%", flexShrink:0,
                          background: i===0 ? C.sage : i===1 ? C.peach : i===2 ? "#A8B8D4" : "#D4A8B8" }}/>
                        <span style={{ fontSize:12, color:C.text, flex:1 }}>{d.name}</span>
                        <span style={{ fontSize:12, fontWeight:600, color:C.sageDk }}>{d.value}</span>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );
          })()}
        </>
      )}

      <div style={{ display:"flex", justifyContent:"space-between",
        alignItems:"center", marginBottom:12, marginTop:8 }}>
        <p style={{ fontSize:13, fontWeight:600, color:C.text }}>AI Guidance</p>
        <button onClick={loadAI}
          style={{ display:"flex", alignItems:"center", gap:5,
            color:C.sage, fontSize:12, fontWeight:500 }}>
          <RefreshCw size={13}/> Refresh
        </button>
      </div>

      {logs.length===0 ? (
        <div style={{ background:C.card, borderRadius:20, padding:"24px",
          textAlign:"center", boxShadow:"0 2px 18px rgba(0,0,0,0.05)" }}>
          <p style={{ fontSize:13, color:C.muted }}>Log your first symptoms to get personalized guidance.</p>
        </div>
      ) : aiLoading ? (
        <div style={{ background:C.card, borderRadius:20, padding:30,
          textAlign:"center", boxShadow:"0 2px 18px rgba(0,0,0,0.05)" }}>
          <p style={{ color:C.muted, fontSize:13 }}>Reading your patterns…</p>
        </div>
      ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {aiCards.map((c,i)=>{
            const Icon = ICONS_MAP[c.icon]??Sparkles;
            return (
              <div key={i} style={{ background:C.card, borderRadius:20, padding:"16px 18px",
                boxShadow:"0 2px 18px rgba(0,0,0,0.05)", display:"flex",
                gap:14, alignItems:"flex-start",
                animation:`fadeUp ${0.15+i*0.1}s ease` }}>
                <div style={{ width:34, height:34, borderRadius:10, background:C.sageLt,
                  display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
                  <Icon size={15} color={C.sageDk}/>
                </div>
                <div>
                  <p style={{ fontSize:14, fontWeight:600, color:C.text, marginBottom:4 }}>{c.title}</p>
                  <p style={{ fontSize:13, color:C.muted, lineHeight:1.65 }}>{c.description}</p>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

/* ─── CHAT ─────────────────────────────────────────────────── */
function ChatScreen({ logs }) {
  const greet = logs.length===0
    ? "Hi there 🌿 I don't see any logs yet. Start journaling and come back — I'll spot patterns in your data."
    : `Hi there 🌿 I can see ${logs.length} log${logs.length===1?"":"s"} in your journal. Ask me anything about your symptoms or patterns.`;

  const [msgs,  setMsgs]  = useState([{role:"assistant",content:greet}]);
  const [input, setInput] = useState("");
  const [busy,  setBusy]  = useState(false);
  const bottomRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[msgs]);

  const sys = `You are a calm, warm, knowledgeable wellness companion. Full log history (includes time-of-day): ${JSON.stringify(logs)}. Help understand patterns. Offer gentle lifestyle suggestions. Never diagnose. Recommend a doctor for serious issues. Keep responses short, warm, conversational. Reference actual data when relevant.`;

  const send = async () => {
    if (!input.trim()||busy) return;
    const text = input.trim(); setInput("");
    const next = [...msgs,{role:"user",content:text}];
    setMsgs(next); setBusy(true);
    try {
      const apiMsgs = next.slice(1).map(m=>({role:m.role,content:m.content}));
      const res = await fetch("https://wchgqkkxldespgnfcbgi.supabase.co/functions/v1/claude-proxy",{
        method:"POST",
        headers:{
          "Content-Type":"application/json",
          "apikey": SUPABASE_ANON,
          "Authorization": `Bearer ${SUPABASE_ANON}`,
        },
        body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, system:sys, messages:apiMsgs }),
      });
      const d = await res.json();
      setMsgs(p=>[...p,{ role:"assistant", content:d.content?.[0]?.text??"Something went wrong." }]);
    } catch {
      setMsgs(p=>[...p,{ role:"assistant", content:"Something went wrong. Please try again." }]);
    }
    setBusy(false);
  };

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"calc(100vh - 80px)" }}>
      <div style={{ padding:"36px 20px 16px", flexShrink:0, maxWidth:480, margin:"0 auto", width:"100%" }}>
        <p style={{ color:C.muted, fontSize:13, marginBottom:4 }}>Your wellness AI</p>
        <h1 style={{ fontFamily:"'DM Serif Display',serif", fontSize:30, color:C.text, fontWeight:400 }}>Chat</h1>
      </div>

      <div style={{ flex:1, overflowY:"auto", padding:"0 20px 12px",
        maxWidth:480, margin:"0 auto", width:"100%" }}>
        {msgs.map((m,i)=>(
          <div key={i} style={{ display:"flex",
            justifyContent:m.role==="user"?"flex-end":"flex-start",
            marginBottom:10, animation:"fadeUp .2s ease" }}>
            <div style={{ maxWidth:"80%", padding:"12px 16px", fontSize:14,
              lineHeight:1.65, whiteSpace:"pre-wrap",
              borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
              background:m.role==="user"?C.sage:C.card,
              color:m.role==="user"?"#fff":C.text,
              boxShadow:"0 1px 8px rgba(0,0,0,0.06)" }}>
              {m.content}
            </div>
          </div>
        ))}
        {busy && (
          <div style={{ display:"flex", marginBottom:10 }}>
            <div style={{ background:C.card, padding:"14px 18px",
              borderRadius:"18px 18px 18px 4px",
              boxShadow:"0 1px 8px rgba(0,0,0,0.06)" }}>
              <div style={{ display:"flex", gap:5 }}>
                {[0,1,2].map(k=>(
                  <div key={k} style={{ width:6, height:6, borderRadius:"50%", background:C.muted,
                    animation:`bounce 1.2s ease-in-out ${k*0.2}s infinite` }}/>
                ))}
              </div>
            </div>
          </div>
        )}
        <div ref={bottomRef}/>
      </div>

      <div style={{ padding:"10px 20px 16px", flexShrink:0, maxWidth:480, margin:"0 auto", width:"100%" }}>
        <div style={{ background:C.card, borderRadius:20,
          padding:"10px 10px 10px 18px", display:"flex", gap:8, alignItems:"center",
          boxShadow:"0 2px 14px rgba(0,0,0,0.08)" }}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&send()}
            placeholder="Ask about your symptoms…"
            style={{ flex:1, fontSize:14, color:C.text }}/>
          <button onClick={send}
            style={{ width:38, height:38, borderRadius:12, flexShrink:0,
              background:input.trim()?C.sage:C.sageLt,
              display:"flex", alignItems:"center", justifyContent:"center",
              transition:"all .15s" }}>
            <Send size={15} color={input.trim()?"#fff":C.muted}/>
          </button>
        </div>
      </div>
    </div>
  );
}

/* ─── SHARED ───────────────────────────────────────────────── */
function Lbl({ children }) {
  return (
    <p style={{ fontSize:11, fontWeight:600, color:C.muted,
      letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:12 }}>
      {children}
    </p>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
